version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    command: npm run dev
    ports:
      - '3000:3000'
      - '8080:8080'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      FRONTEND_ORIGIN: http://localhost:8080
    depends_on:
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_started
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend_network

  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - '2181:2181'
    networks:
      - backend_network

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    ports:
      - '9093:9093'
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CREATE_TOPICS: notifications:1:1
    depends_on:
      - zookeeper
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics.sh --bootstrap-server localhost:9093 --list >/dev/null 2>&1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - backend_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - '8081:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend_network

  demo-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-consumer
    command: npm run kafka:demo-consumer
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - demo
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge
